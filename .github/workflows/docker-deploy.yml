name: Docker Publish and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  docker-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Docker Hub credentials
        id: dockerhub-creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" ]]; then
            echo "::error title=Missing secret::DOCKERHUB_USERNAME is required for docker-publish."
            exit 1
          fi

          if [[ -z "${DOCKERHUB_TOKEN}" && -z "${DOCKERHUB_PASSWORD}" ]]; then
            echo "::error title=Missing secret::Set DOCKERHUB_TOKEN (recommended) or DOCKERHUB_PASSWORD for docker-publish."
            exit 1
          fi

          echo "username=${DOCKERHUB_USERNAME}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ steps.dockerhub-creds.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN != '' && secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.dockerhub-creds.outputs.username }}/wealth-api-demo
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-fly:
    runs-on: ubuntu-latest
    needs: docker-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Fly token
        id: fly-token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [[ -z "${FLY_API_TOKEN}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "FLY_API_TOKEN is not set; skipping Fly deploy."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flyctl
        if: ${{ steps.fly-token.outputs.available == 'true' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: ${{ steps.fly-token.outputs.available == 'true' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
