name: Render Deploy + Smoke E2E

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-and-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "${RENDER_DEPLOY_HOOK_URL}" ]]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK_URL"
            missing=1
          fi
          if [[ -z "${RENDER_BASE_URL}" ]]; then
            echo "Missing secret: RENDER_BASE_URL"
            missing=1
          fi
          if [[ "$missing" -eq 1 ]]; then
            echo "Please set required secrets in GitHub Actions settings."
            exit 1
          fi

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}"

      - name: Wait for Render health endpoint
        env:
          RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          set -euo pipefail
          HEALTH_URL="${RENDER_BASE_URL%/}/actuator/health"
          echo "Polling ${HEALTH_URL} until status is UP"
          for attempt in $(seq 1 40); do
            code=$(curl -sS -o health.json -w "%{http_code}" "$HEALTH_URL" || true)
            if [[ "$code" == "200" ]] && grep -q '"status"[[:space:]]*:[[:space:]]*"UP"' health.json; then
              echo "Render app is healthy"
              exit 0
            fi
            echo "Attempt ${attempt}/40: not ready (HTTP ${code:-n/a}), waiting 15s"
            sleep 15
          done
          echo "Render app did not become healthy in time"
          [[ -f health.json ]] && cat health.json || true
          exit 1

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install API artifact for UI module dependency
        run: mvn -B -pl api -DskipTests install

      - name: Run headless smoke E2E on deployed app
        env:
          RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          mvn -B -pl ui-tests verify \
            -Dit.test=SmokeUiIT \
            -Dui.headless=true \
            -Dui.base-url="${RENDER_BASE_URL%/}"

      - name: Generate Allure report
        if: always()
        run: mvn -B -pl ui-tests allure:report

      - name: Upload E2E test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: render-smoke-e2e-artifacts
          path: |
            ui-tests/target/failsafe-reports/
            ui-tests/target/cucumber-reports/
            ui-tests/target/allure-results/
            ui-tests/target/site/allure-maven-plugin/
          if-no-files-found: warn
