services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    image: wealth-jenkins:lts-jdk21-maven
    container_name: wealth-jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    environment:
      TZ: "America/New_York"
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true -Duser.timezone=America/New_York"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
